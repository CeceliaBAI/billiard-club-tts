name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Prepare config
        run: cp config.example.json config.json

      - name: Install dependencies
        run: |
          set -e
          pip install --upgrade pip
          pip install pywebview pygame pystray Pillow sounddevice pyobjc-framework-Quartz pyobjc-framework-Cocoa
          pip install pyinstaller
          pip list 2>&1

      - name: Build
        run: |
          echo "=== Building ==="
          pyinstaller build.spec 2>&1
          echo "=== Build exit code: $? ==="
          echo "=== dist contents ==="
          ls -laR dist/ || true

      - name: Create macOS .app bundle
        run: |
          APP_NAME="六六台球播报系统"
          EXE_DIR="dist/${APP_NAME}"
          APP_BUNDLE="dist/${APP_NAME}.app"

          mkdir -p "${APP_BUNDLE}/Contents/MacOS"
          mkdir -p "${APP_BUNDLE}/Contents/Resources"

          # 复制整个 onedir 输出（可执行文件 + 依赖 + 数据文件）
          cp -R "${EXE_DIR}/" "${APP_BUNDLE}/Contents/MacOS/"

          # 复制图标
          cp assets/icon.icns "${APP_BUNDLE}/Contents/Resources/"

          # 生成 Info.plist
          cat > "${APP_BUNDLE}/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>${APP_NAME}</string>
              <key>CFBundleIdentifier</key>
              <string>com.billiardclub.tts</string>
              <key>CFBundleName</key>
              <string>${APP_NAME}</string>
              <key>CFBundleIconFile</key>
              <string>icon.icns</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>LSMinimumSystemVersion</key>
              <string>10.13</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          PLIST

          echo "=== .app bundle created ==="
          ls -laR "${APP_BUNDLE}"

      - name: Ad-hoc code sign (macOS)
        run: |
          codesign --force --deep --sign - dist/六六台球播报系统.app
          echo "=== Code sign done ==="

      - name: Upload artifact (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: billiard-club-tts-macOS
          path: dist/六六台球播报系统.app

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Prepare config
        run: copy config.example.json config.json

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pywebview pygame pystray Pillow sounddevice pywin32
          pip install pyinstaller
          pip list

      - name: Build
        shell: cmd
        run: |
          echo === Building ===
          pyinstaller build.spec
          echo === Build complete ===
          dir dist\

      - name: Upload artifact (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: billiard-club-tts-Windows
          path: dist/*.exe
