name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: write
  packages: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install pywebview pygame pystray Pillow sounddevice pyobjc-framework-Quartz
          pip install pyinstaller

      - name: Build
        run: pyinstaller build.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 六六台球播报系统-macOS
          path: dist/六六台球播报系统

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install pywebview pygame pystray Pillow sounddevice pywin32
          pip install pyinstaller

      - name: Build
        run: pyinstaller build.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 六六台球播报系统-Windows
          path: dist/六六台球播报系统.exe
