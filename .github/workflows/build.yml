name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          set -e
          pip install --upgrade pip
          pip install pywebview pygame pystray Pillow sounddevice pyobjc-framework-Quartz pyobjc-framework-Cocoa
          pip install pyinstaller
          pip list 2>&1

      - name: Build
        run: |
          echo "=== Python imports test ==="
          python -c "import pygame; print('pygame OK')"
          python -c "import pygame.mixer; pygame.mixer.init(); print('mixer OK')"
          echo "=== Building ==="
          pyinstaller build.spec 2>&1 || true
          echo "=== Build exit code: $? ==="
          echo "=== dist contents ==="
          ls -la dist/ || true
          find dist -type f 2>/dev/null || true

      - name: Upload artifact (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: billiard-club-tts-macOS
          path: dist/*

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pywebview pygame pystray Pillow sounddevice pywin32
          pip install pyinstaller
          pip list

      - name: Build
        shell: cmd
        run: |
          echo === Building ===
          pyinstaller build.spec
          echo === Build complete ===
          dir dist\

      - name: Upload artifact (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: billiard-club-tts-Windows
          path: dist/*.exe
